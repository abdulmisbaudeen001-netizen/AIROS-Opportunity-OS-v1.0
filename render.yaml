# AIROS Opportunity OS v1.0 — Render Deployment Configuration

services:
  - type: web
    name: airos-opportunity-os
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_MODEL
        value: google/gemini-flash-1.5
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: BROWSERLESS_API_KEY
        sync: false
      - key: BROWSERLESS_URL
        value: https://chrome.browserless.io
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: AUTO_APPLY
        value: "false"
      - key: SMART_APPLY
        value: "true"
      - key: TIMEZONE
        value: Africa/Lagos
      - key: WEB_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: PORT
        value: "8000"
      # Optional: add BRAVE_API_KEY or TAVILY_API_KEY for better search
