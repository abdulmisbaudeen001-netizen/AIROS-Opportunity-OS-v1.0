<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIROS Opportunity OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.2;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">A</div>
      <div class="login-logo-text">
        <h1>AIROS</h1>
        <span>Opportunity OS &nbsp;v1.0</span>
      </div>
    </div>

    <h2>Sign in</h2>
    <p>Enter your password to access the dashboard.</p>

    <div class="login-error" id="login-error">Incorrect password. Try again.</div>

    <form id="login-form">
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          autofocus
        />
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
        Sign in
      </button>
    </form>

    <p style="margin-top:1.5rem; font-size:0.72rem; text-align:center;">
      Single-user access · Controlled by you
    </p>
  </div>
</div>

<script>
  // If already authenticated, go straight to app
  if (localStorage.getItem('airos_token')) {
    window.location.href = '/app.html';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.style.display = 'none';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('airos_token', data.token);
        window.location.href = '/app.html';
      } else {
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch (err) {
      errEl.textContent = 'Connection error. Is the server running?';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
