<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIROS Opportunity OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div id="app">
  <div class="shell">

    <!-- ── Header ─────────────────────────────────────────────── -->
    <header class="header">
      <div class="header-logo">
        <div class="logo-mark">A</div>
        <span class="logo-text">AIROS Opportunity OS</span>
        <span class="logo-version">v1.0</span>
      </div>

      <div class="header-right">
        <div class="system-status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Connecting...</span>
        </div>
        <button class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
      </div>
    </header>

    <!-- ── Sidebar ────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div id="sidebar-nav"></div>

      <div class="sidebar-footer">
        <div class="nav-item" style="cursor:default;opacity:0.5">
          <span class="nav-icon">◉</span>
          <span style="font-size:0.72rem;font-family:var(--font-mono)">Single user</span>
        </div>
      </div>
    </aside>

    <!-- ── Main ───────────────────────────────────────────────── -->
    <main class="main">

      <div class="page" id="page-dashboard"></div>
      <div class="page" id="page-mission"></div>
      <div class="page" id="page-profile"></div>
      <div class="page" id="page-opportunities"></div>
      <div class="page" id="page-applications"></div>
      <div class="page" id="page-documents"></div>
      <div class="page" id="page-email"></div>
      <div class="page" id="page-settings"></div>

    </main>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script type="module" src="/js/app.js"></script>

<script>
  // Show app shell once JS is ready (prevents FOUC)
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('app').style.display = 'block';
  });
</script>

</body>
</html>
